<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Soft Ambient Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0"/>
    </radialGradient>

    <!-- Liquid Aqua Base Gradient (Vivid Light Color) -->
    <linearGradient id="aquaBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0ffff"/>
      <stop offset="40%" stop-color="#00f2fe"/>
      <stop offset="100%" stop-color="#4facfe"/>
    </linearGradient>

    <!-- Specular Highlight Gradient (North-West Light Source) -->
    <linearGradient id="specularLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Shadow Gradient (South-East Shadow Side) -->
    <linearGradient id="waveShadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="70%" stop-color="#004e64" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#002b36" stop-opacity="0.4"/>
    </linearGradient>

    <!-- 3D Liquid Volume Shader-like Filter -->
    <filter id="liquidGlow" x="-20%" y="-20%" width="140%" height="140%">
      <!-- White diffuse highlight on northwest edge -->
      <feDropShadow dx="-3" dy="-3" stdDeviation="5" flood-color="#ffffff" flood-opacity="0.8"/>
      <!-- Soft refraction shadow on southeast edge -->
      <feDropShadow dx="4" dy="5" stdDeviation="7" flood-color="#002b36" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Ambient Glow Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGlow)"/>

  <!-- Concentric Ripples (From Outer to Inner) -->

  <!-- Ripple Ring 4 (Outer Wave) -->
  <circle cx="256" cy="256" r="205" fill="none" stroke="url(#waveShadow)" stroke-width="22" opacity="0.6"/>
  <circle cx="256" cy="256" r="205" fill="none" stroke="url(#aquaBase)" stroke-width="16" filter="url(#liquidGlow)"/>
  <circle cx="254" cy="254" r="205" fill="none" stroke="url(#specularLight)" stroke-width="6" opacity="0.85"/>

  <!-- Ripple Ring 3 (Mid Wave) -->
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#waveShadow)" stroke-width="24" opacity="0.75"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="url(#aquaBase)" stroke-width="18" filter="url(#liquidGlow)"/>
  <circle cx="253" cy="253" r="148" fill="none" stroke="url(#specularLight)" stroke-width="7" opacity="0.9"/>

  <!-- Ripple Ring 2 (Inner Wave) -->
  <circle cx="256" cy="256" r="92" fill="none" stroke="url(#waveShadow)" stroke-width="26" opacity="0.85"/>
  <circle cx="256" cy="256" r="92" fill="none" stroke="url(#aquaBase)" stroke-width="20" filter="url(#liquidGlow)"/>
  <circle cx="252" cy="252" r="92" fill="none" stroke="url(#specularLight)" stroke-width="8" opacity="0.95"/>

  <!-- Center Drop (Splash Point) -->
  <circle cx="256" cy="256" r="38" fill="url(#waveShadow)" opacity="0.9"/>
  <circle cx="256" cy="256" r="38" fill="url(#aquaBase)" filter="url(#liquidGlow)"/>
  <!-- Concentrated spherical light highlight -->
  <circle cx="249" cy="249" r="30" fill="url(#specularLight)" opacity="0.95"/>
  <circle cx="242" cy="242" r="8" fill="#ffffff" opacity="0.9"/>
</svg>
